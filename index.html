<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Doctor亿万 - 宠物全生命周期医疗平台</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://webapi.amap.com/loader.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2" defer></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    primary: { 50:'#F3E8FF',100:'#E9D5FF',200:'#D8B4FE',300:'#C084FC',400:'#A855F7',500:'#9333EA',600:'#7C3AED',700:'#6C3CE7',800:'#5B21B6',900:'#4C1D95' },
                        secondary: { 50:'#FFF0F5',100:'#FFE4E6',200:'#FDA4AF',300:'#FB7185',400:'#F472B6',500:'#FF6B9D',600:'#EC4899',700:'#DB2777',800:'#BE185D',900:'#9D174D' },
                        accent1: { 50:'#FFFBEB',100:'#FEF3C7',200:'#FDE68A',300:'#FCD34D',400:'#FBBF24',500:'#FF9F43',600:'#F59E0B',700:'#D97706',800:'#B45309',900:'#92400E' },
                        accent2: { 50:'#F0FDF4',100:'#DCFCE7',200:'#BBF7D0',300:'#86EFAC',400:'#4ADE80',500:'#00D2A0',600:'#22C55E',700:'#16A34A',800:'#15803D',900:'#166534' },
                        accent3: { 50:'#F0F9FF',100:'#E0F2FE',200:'#BAE6FD',300:'#7DD3FC',400:'#38BDF8',500:'#4FC3F7',600:'#0EA5E9',700:'#0284C7',800:'#0369A1',900:'#075985' },
                        lavender: { 50:'#F3E8FF',100:'#E9D5FF',200:'#D8B4FE',300:'#C084FC',400:'#B388FF',500:'#9333EA',600:'#7C3AED',700:'#6C3CE7',800:'#5B21B6',900:'#4C1D95' },
                        bg: { 50:'#FBF9FF',100:'#F8F7FF',200:'#F3EDFF',300:'#E8E0FF',400:'#D9D1FF',500:'#C4B5FD',600:'#A78BFA',700:'#8B5CF6',800:'#7C3AED',900:'#6C3CE7' },
                        slate: { 50:'#F8FAFC',100:'#F1F5F9',200:'#E2E8F0',300:'#CBD5E1',400:'#94A3B8',500:'#64748B',600:'#475569',700:'#334155',800:'#1E293B',900:'#0F172A' }
                }
            }
        }
    </script>
    <style>
        *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
        body{font-family:-apple-system,BlinkMacSystemFont,'SF Pro Display','SF Pro Text',system-ui,sans-serif;color:#0F172A;-webkit-font-smoothing:antialiased;background:#F8F7FF}
        .no-scrollbar::-webkit-scrollbar{display:none}
        .no-scrollbar{-ms-overflow-style:none;scrollbar-width:none}
        @keyframes fadeUp{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}
        @keyframes fadeIn{from{opacity:0}to{opacity:1}}
        @keyframes pulse-ring{0%{transform:scale(.8);opacity:.6}100%{transform:scale(2.4);opacity:0}}
        @keyframes shimmer{0%{background-position:-200% 0}100%{background-position:200% 0}}
        @keyframes bounceIn{0%{transform:scale(.3);opacity:0}50%{transform:scale(1.05)}70%{transform:scale(.9)}100%{transform:scale(1);opacity:1}}
        @keyframes pawPrint{0%,100%{transform:rotate(-5deg) scale(1)}50%{transform:rotate(5deg) scale(1.05)}}
        @keyframes gradientShift{0%{background-position:0% 50%}50%{background-position:100% 50%}100%{background-position:0% 50%}}
        @keyframes floatUp{0%,100%{transform:translateY(0)}50%{transform:translateY(-4px)}}
        @keyframes shimmerBorder{0%{background-position:-200% 0}100%{background-position:200% 0}}
        @keyframes markerPop{0%{transform:scale(0) translateY(10px);opacity:0}70%{transform:scale(1.1) translateY(-2px)}100%{transform:scale(1) translateY(0);opacity:1}}
        .fade-up{animation:fadeUp .4s cubic-bezier(.22,1,.36,1) both}
        .fade-in{animation:fadeIn .3s ease both}
        .bounce-in{animation:bounceIn .5s cubic-bezier(.34,1.56,.64,1) both}
        .float-up{animation:floatUp 3s ease-in-out infinite}
        .paw-animate{animation:pawPrint 2s ease-in-out infinite}
        /* Gradient backgrounds */
        .bg-gradient-primary{background:linear-gradient(135deg,#6C3CE7 0%,#7C3AED 50%,#8B5CF6 100%);background-size:200% 200%;animation:gradientShift 4s ease infinite}
        .bg-gradient-secondary{background:linear-gradient(135deg,#FF6B9D 0%,#F472B6 100%)}
        .bg-gradient-accent1{background:linear-gradient(135deg,#FF9F43 0%,#FBBF24 100%)}
        .bg-gradient-lavender{background:linear-gradient(135deg,#B388FF 0%,#A855F7 100%)}
        .bg-gradient-accent2{background:linear-gradient(135deg,#00D2A0 0%,#4ADE80 100%)}
        .bg-gradient-accent2{background:linear-gradient(135deg,#00D2A0 0%,#4ADE80 100%)}
        .bg-gradient-accent3{background:linear-gradient(135deg,#4FC3F7 0%,#38BDF8 100%)}
        .bg-gradient-secondary{background:linear-gradient(135deg,#FF6B9D 0%,#F472B6 100%)}
        /* Card styles with gradient borders */
        .card{background:#fff;border-radius:24px;border:1px solid rgba(255,255,255,.8);box-shadow:0 8px 30px rgba(108,60,231,.08);position:relative;overflow:hidden}
        .card::before{content:'';position:absolute;top:0;left:0;width:4px;height:100%;background:linear-gradient(180deg,#6C3CE7,#FF6B9D);border-radius:4px 0 0 4px}
        .card-compact{background:#fff;border-radius:20px;border:1px solid rgba(255,255,255,.8);box-shadow:0 4px 20px rgba(108,60,231,.06);position:relative;overflow:hidden}
        .card-compact::before{content:'';position:absolute;top:0;left:0;width:4px;height:100%;background:linear-gradient(180deg,#6C3CE7,#FF6B9D);border-radius:4px 0 0 4px}
        .card-compact:hover{box-shadow:0 8px 30px rgba(108,60,231,.12);transform:translateY(-2px)}
        .claim-badge{display:inline-flex;align-items:center;gap:4px;padding:4px 12px;border-radius:100px;font-size:11px;font-weight:700}
        .claim-badge-verified{background:linear-gradient(135deg,#00D2A0,#4ADE80);color:#fff}
        .claim-badge-pending{background:linear-gradient(135deg,#FF9F43,#FBBF24);color:#fff}
        .claim-badge-unclaimed{background:#F1F5F9;color:#94A3B8}
        .claim-poi-card{background:#fff;border:2px solid #E9D5FF;border-radius:16px;padding:14px;margin-bottom:10px;transition:all .2s;cursor:pointer}
        .claim-poi-card:hover{border-color:#6C3CE7;box-shadow:0 4px 16px rgba(108,60,231,.1)}
        .card-glow{box-shadow:0 8px 40px rgba(108,60,231,.15),0 2px 8px rgba(108,60,231,.06)}
        /* Pet card variants */
        .pet-card-cat{background:linear-gradient(135deg,rgba(224,64,251,.08) 0%,rgba(192,132,252,.05) 100%);border:2px solid rgba(224,64,251,.2)}
        .pet-card-dog{background:linear-gradient(135deg,rgba(255,159,67,.08) 0%,rgba(251,191,36,.05) 100%);border:2px solid rgba(255,159,67,.2)}
        .pet-card-bird{background:linear-gradient(135deg,rgba(79,195,247,.08) 0%,rgba(56,189,248,.05) 100%);border:2px solid rgba(79,195,247,.2)}
        .pet-card-reptile{background:linear-gradient(135deg,rgba(0,210,160,.08) 0%,rgba(74,222,128,.05) 100%);border:2px solid rgba(0,210,160,.2)}
        .pet-card-exotic{background:linear-gradient(135deg,rgba(179,136,255,.08) 0%,rgba(168,85,247,.05) 100%);border:2px solid rgba(179,136,255,.2)}
        /* Pill styles */
        .pill{padding:8px 18px;border-radius:100px;font-size:14px;font-weight:600;transition:all .3s cubic-bezier(.22,1,.36,1)}
        .pill-active{background:linear-gradient(135deg,#6C3CE7 0%,#7C3AED 100%);color:#fff;box-shadow:0 4px 16px rgba(108,60,231,.3)}
        .pill-default{background:#F3E8FF;color:#6C3CE7}
        .pill-default:hover{background:#E9D5FF}
        .pill-default:active{background:#D8B4FE}
        /* Button styles with gradients */
        .btn-primary{background:linear-gradient(135deg,#6C3CE7 0%,#7C3AED 100%);color:#fff;border-radius:24px;font-weight:700;transition:all .3s cubic-bezier(.22,1,.36,1);box-shadow:0 6px 24px rgba(108,60,231,.3);position:relative;overflow:hidden;padding:14px 28px;font-size:16px}
        .btn-primary::before{content:'';position:absolute;top:0;left:-100%;width:100%;height:100%;background:linear-gradient(90deg,transparent,rgba(255,255,255,.3),transparent);transition:left .5s}
        .btn-primary:hover::before{left:100%}
        .btn-primary:hover{transform:translateY(-2px);box-shadow:0 8px 32px rgba(108,60,231,.4)}
        .btn-primary:active{transform:scale(.96);box-shadow:0 4px 12px rgba(108,60,231,.2)}
        .btn-booking{background:linear-gradient(135deg,#FF6B9D 0%,#7C3AED 100%);color:#fff;border-radius:24px;font-weight:700;transition:all .3s cubic-bezier(.22,1,.36,1);box-shadow:0 8px 28px rgba(255,107,157,.4);padding:16px 32px;font-size:16px}
        .btn-booking:hover{transform:translateY(-3px);box-shadow:0 12px 36px rgba(255,107,157,.5)}
        .btn-booking:active{transform:scale(.96);box-shadow:0 6px 20px rgba(255,107,157,.3)}
        .btn-outline{border:3px solid transparent;background:linear-gradient(#fff,#fff) padding-box,linear-gradient(135deg,#6C3CE7,#FF6B9D) border-box;color:#6C3CE7;border-radius:24px;font-weight:700;transition:all .3s;padding:12px 24px;font-size:15px}
        .btn-outline:hover{background:linear-gradient(135deg,rgba(108,60,231,.05),rgba(255,107,157,.05)) padding-box,linear-gradient(135deg,#6C3CE7,#FF6B9D) border-box}
        .btn-outline:active{transform:scale(.96)}
        .btn-ghost{color:#64748B;border-radius:20px;font-weight:600;transition:all .2s;padding:10px 20px}
        .btn-ghost:active{background:#F3E8FF}
        .btn-pay{background:linear-gradient(135deg,#FF6B9D 0%,#FF9F43 100%);color:#fff;border-radius:24px;font-weight:700;transition:all .3s;box-shadow:0 8px 28px rgba(255,107,157,.4);padding:16px 32px;font-size:16px}
        .btn-pay:hover{transform:translateY(-2px);box-shadow:0 12px 36px rgba(255,107,157,.5)}
        .btn-pay:active{transform:scale(.96)}
        /* Badge styles */
        .badge{font-size:12px;padding:4px 12px;border-radius:100px;font-weight:700;letter-spacing:.02em}
        .badge-new{background:linear-gradient(135deg,#FF6B9D,#FF9F43);color:#fff}
        .badge-pending{background:linear-gradient(135deg,#FF9F43,#FBBF24);color:#fff}
        .badge-confirmed{background:linear-gradient(135deg,#6C3CE7,#7C3AED);color:#fff}
        .badge-completed{background:linear-gradient(135deg,#00D2A0,#4ADE80);color:#fff}
        /* Input styles */
        .input-field{width:100%;padding:16px 20px;border:3px solid #E9D5FF;border-radius:20px;font-size:16px;transition:all .3s;background:#fff;outline:none;font-weight:500}
        .input-field:focus{border-color:#6C3CE7;box-shadow:0 0 0 4px rgba(108,60,231,.1)}
        .input-field::placeholder{color:#C4B5FD}
        .input-search{width:100%;padding:20px 24px 20px 56px;border:3px solid transparent;border-radius:24px;font-size:16px;transition:all .3s;background:#fff;outline:none;box-shadow:0 8px 30px rgba(108,60,231,.08);font-weight:500}
        .input-search:focus{border-color:#6C3CE7;box-shadow:0 12px 40px rgba(108,60,231,.12)}
        .input-search::placeholder{color:#C4B5FD}
        input,select,textarea{font-size:16px!important}
        /* Logo animation */
        .logo-container{position:relative}
        .logo-container::after{content:'';position:absolute;inset:-4px;background:linear-gradient(135deg,rgba(108,60,231,0.2),rgba(255,107,157,.1),rgba(255,107,101,.1));border-radius:12px;z-index:-1;opacity:0;transition:opacity .3s}
        .logo-container:hover::after{opacity:1}
        /* User location marker */
        .loc-dot{width:24px;height:24px;background:linear-gradient(135deg,#6C3CE7,#FF6B9D);border:4px solid #fff;border-radius:50%;box-shadow:0 4px 16px rgba(108,60,231,.5);position:relative;z-index:2}
        .loc-pulse{position:absolute;width:24px;height:24px;border-radius:50%;background:linear-gradient(135deg,rgba(108,60,231,.3),rgba(255,107,157,.15));z-index:1;animation:pulse-ring 2.5s ease-out infinite}
        /* Hospital marker */
        .h-marker{width:48px;height:48px;border-radius:16px;display:flex;align-items:center;justify-content:center;box-shadow:0 6px 20px rgba(0,0,0,.2);border:4px solid #fff;transition:all .3s cubic-bezier(.34,1.56,.64,1);position:relative;animation:bounceIn .5s cubic-bezier(.34,1.56,.64,1)}
        .h-marker:hover{transform:scale(1.2);box-shadow:0 8px 28px rgba(0,0,0,.25)}
        .h-marker:active{transform:scale(1.25)}
        .h-marker-dot{position:absolute;bottom:-6px;right:-6px;width:16px;height:16px;border-radius:50%;border:3px solid #fff;box-shadow:0 2px 8px rgba(0,0,0,.15)}
        .h-marker-pulse{position:absolute;width:100%;height:100%;border-radius:16px;background:inherit;opacity:.4;animation:pulse-ring .6s ease-out infinite alternate}
        /* Equipment tag */
        .equip-tag{display:inline-flex;align-items:center;gap:4px;padding:5px 10px;border-radius:10px;font-size:11px;font-weight:600}
        .equip-idle{background:linear-gradient(135deg,#DCFCE7,#BBF7D0);color:#15803D}
        .equip-busy{background:linear-gradient(135deg,#FED7AA,#FDBA74);color:#C2410C}
        .equip-offline{background:#F1F5F9;color:#94A3B8}
        /* POI type tag */
        .poi-type-tag{font-size:11px;padding:5px 12px;border-radius:10px;background:linear-gradient(135deg,#F1F5F9,#E2E8F0);color:#475569;font-weight:500}
        /* Doctor card */
        .doc-card{border:3px solid #E9D5FF;border-radius:20px;padding:16px;transition:all .3s cubic-bezier(.22,1,.36,1);cursor:pointer}
        .doc-card.selected{border-color:#6C3CE7;background:linear-gradient(135deg,rgba(108,60,231,.05),rgba(255,107,157,.02));box-shadow:0 8px 24px rgba(108,60,231,.2)}
        .doc-card:hover{transform:translateY(-3px);box-shadow:0 12px 32px rgba(0,0,0,.1)}
        .doc-card:active{transform:scale(.97)}
        /* Glass nav */
        .glass-nav{background:linear-gradient(180deg,rgba(255,255,255,.95) 0%,rgba(255,255,255,.88) 100%);backdrop-filter:blur(20px) saturate(180%);-webkit-backdrop-filter:blur(20px) saturate(180%);border-top:1px solid rgba(108,60,231,.1);box-shadow:0 -4px 30px rgba(108,60,231,.08)}
        /* Nav item styles */
        .nav-item{transition:all .3s cubic-bezier(.22,1,.36,1);position:relative;padding:8px 16px;border-radius:20px}
        .nav-item i{transition:all .3s;font-size:22px;background:linear-gradient(135deg,#C4B5FD,#A78BFA);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
        .nav-item span{transition:all .3s;color:#64748B;font-weight:600;font-size:11px;margin-top:4px}
        .nav-item.active{background:linear-gradient(135deg,rgba(108,60,231,.1),rgba(255,107,157,.08))}
        .nav-item.active i{background:linear-gradient(135deg,#6C3CE7,#FF6B9D);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;transform:scale(1.15)}
        .nav-item.active span{color:#6C3CE7;font-weight:700}
        /* Nav booking special */
        .nav-booking{position:relative}
        .nav-booking::before{content:'';position:absolute;-top-2;left:50%;transform:translateX(-50%);width:36px;height:36px;background:linear-gradient(135deg,#FF6B65,#F97316);border-radius:50%;z-index:-1;box-shadow:0 4px 16px rgba(255,107,101,.4);animation:pulse-ring 2s ease-out infinite}
        /* Search suggest */
        .suggest-item{padding:16px 20px;border-bottom:1px solid #F3E8FF;transition:all .15s}
        .suggest-item:hover{background:linear-gradient(135deg,rgba(108,60,231,0.03),rgba(255,107,157,.02))}
        .suggest-item:active{background:linear-gradient(135deg,rgba(108,60,231,0.06),rgba(255,107,157,.04))}
        /* Skeleton */
        .skeleton{background:linear-gradient(90deg,#F3E8FF 25%,#E9D5FF 50%,#F3E8FF 75%);background-size:200% 100%;animation:shimmer 1.8s infinite;border-radius:10px}
        /* Gradient border card */
        .gradient-border-card{background:#fff;border-radius:20px;padding:1px;background:linear-gradient(135deg,#6C3CE7,#FF6B9D,#FF9F43,#6C3CE7);background-size:300% 300%;animation:gradientShift 4s ease infinite}
        .gradient-border-card .inner{background:#fff;border-radius:19px}
        /* Hero banner gradient */
        .hero-gradient{background:linear-gradient(135deg,#6C3CE7 0%,#7C3AED 40%,#FF6B9D 100%);background-size:200% 200%;animation:gradientShift 6s ease infinite}
/* FAB Button */
        .fab-button{width:64px;height:64px;border-radius:50%;background:linear-gradient(135deg,#6C3CE7 0%,#FF6B9D 100%);box-shadow:0 8px 28px rgba(108,60,231,.4),0 0 0 4px rgba(108,60,231,.1);display:flex;align-items:center;justify-content:center;transition:all .3s cubic-bezier(.34,1.56,.64,1);position:relative}
        .fab-button::before{content:'';position:absolute;inset:-6px;border-radius:50%;background:linear-gradient(135deg,#6C3CE7 0%,#FF6B9D 100%);opacity:.4;filter:blur(12px);z-index:-1;animation:pulse-ring 2s ease-out infinite}
        .fab-button:hover{transform:translateY(-4px) scale(1.1);box-shadow:0 12px 40px rgba(108,60,231,.5),0 0 0 6px rgba(108,60,231,.15)}
        .fab-button:active{transform:scale(1.05)}
        .fab-button i{color:#fff;font-size:28px}
        /* Pet category circles */
        .pet-cat{background:linear-gradient(135deg,#E040FB,#C084FC);color:#fff}
        .pet-dog{background:linear-gradient(135deg,#FF9F43,#FBBF24);color:#fff}
        .pet-bird{background:linear-gradient(135deg,#4FC3F7,#38BDF8);color:#fff}
        .pet-reptile{background:linear-gradient(135deg,#00D2A0,#4ADE80);color:#fff}
        .pet-exotic{background:linear-gradient(135deg,#B388FF,#A855F7);color:#fff}
        /* Quick entry icon styles */
        .quick-icon{width:72px;height:72px;border-radius:50%;display:flex;align-items:center;justify-content:center;box-shadow:0 8px 24px rgba(108,60,231,.15);transition:all .3s cubic-bezier(.34,1.56,.64,1);position:relative;overflow:hidden;border:4px solid rgba(255,255,255,.5)}
        .quick-icon::before{content:'';position:absolute;inset:0;background:linear-gradient(135deg,rgba(255,255,255,.3),transparent);opacity:0;transition:opacity .3s}
        .quick-icon:hover{transform:translateY(-6px) scale(1.08);box-shadow:0 12px 36px rgba(108,60,231,.25)}
        .quick-icon:hover::before{opacity:1}
        .quick-icon:active{transform:scale(.95)}
        .quick-icon-primary{background:linear-gradient(135deg,#6C3CE7,#7C3AED)}
        .quick-icon-secondary{background:linear-gradient(135deg,#FF6B9D,#F472B6)}
        .quick-icon-accent1{background:linear-gradient(135deg,#FF9F43,#FBBF24)}
        .quick-icon-accent2{background:linear-gradient(135deg,#00D2A0,#4ADE80)}
        .quick-icon-accent3{background:linear-gradient(135deg,#4FC3F7,#38BDF8)}
        .quick-icon-lavender{background:linear-gradient(135deg,#B388FF,#A855F7)}
        .quick-icon-teal{background:linear-gradient(135deg,#00BFA5,#00D2A0)}
        .quick-icon-coral{background:linear-gradient(135deg,#FF6B9D,#FF8A80)}
        .quick-icon-amber{background:linear-gradient(135deg,#FF9F43,#FBBF24)}
        .quick-icon-purple{background:linear-gradient(135deg,#7C3AED,#A78BFA)}
        .quick-icon-green{background:linear-gradient(135deg,#22C55E,#4ADE80)}
        .quick-icon-blue{background:linear-gradient(135deg,#0EA5E9,#38BDF8)}
        /* Detail panel enhanced */
        .detail-panel{background:#fff;border-radius:28px 28px 0 0;box-shadow:0 -12px 48px rgba(108,60,231,.12)}
        .detail-panel-handle{width:48px;height:6px;background:linear-gradient(90deg,#D8B4FE,#E9D5FF,#D8B4FE);border-radius:6px;margin:16px auto}
        /* Map modal enhanced */
        .map-search-bar{background:linear-gradient(180deg,rgba(255,255,255,.95) 0%,rgba(255,255,255,.9) 100%);backdrop-filter:blur(16px);border-radius:20px;padding:12px;box-shadow:0 8px 32px rgba(0,0,0,.12)}
        /* Section title with accent */
        .section-title{position:relative;display:inline-block}
        .section-title::after{content:'';position:absolute;bottom:-4px;left:0;width:24px;height:3px;background:linear-gradient(90deg,#6C3CE7,#FF6B9D);border-radius:2px}
        /* Mode toggle enhanced */
        .mode-toggle{background:linear-gradient(135deg,#F3E8FF,#E9D5FF);padding:6px;border-radius:20px}
        .mode-btn{transition:all .3s cubic-bezier(.22,1,.36,1);border-radius:16px;position:relative;overflow:hidden;padding:10px 20px;font-size:14px;font-weight:700}
        .mode-btn.active{background:linear-gradient(135deg,#6C3CE7,#FF6B9D);color:#fff;box-shadow:0 4px 16px rgba(108,60,231,.35)}
        /* Toast enhanced */
        .toast-enhanced{background:linear-gradient(135deg,#1E293B,#334155);color:#fff;padding:16px 28px;border-radius:20px;font-size:15px;font-weight:600;box-shadow:0 12px 40px rgba(0,0,0,.3)}
    </style>
    <!-- PWA -->
    <link rel="manifest" href="./manifest.json">
    <meta name="theme-color" content="#6C3CE7">
    <meta name="apple-mobile-web-app-capable" content="yes">

<script>
    // === 全局错误兜底（v1.4.0 Safari 兼容修复） ===
    window.onerror = function(msg, url, line, col, error) {
        console.error('[全局错误]', msg, 'at', url, 'line:', line);
        // 不阻止页面渲染，只记录错误

    <script>
    // ====== 高德地图配置 ======
    const AMAP_CONFIG = {
        key: '8c9edd1479c8f164aad4ba7d7876a195',
        securityJsCode: '37200d6fe4541592d1040da33fc4af34'
    };

    // ====== WGS84 -> GCJ02 坐标转换（解决浏览器原生定位偏移） ======
    const PI = Math.PI, A = 6378245.0, EE = 0.00669342162296594323;
    function outOfChina(lng,lat){return!(lng>73.66&&lng<135.05&&lat>3.86&&lat<53.55)}
    function _tLat(x,y){let r=-100+2*x+3*y+.2*y*y+.1*x*y+.2*Math.sqrt(Math.abs(x));r+=(20*Math.sin(6*x*PI)+20*Math.sin(2*x*PI))*2/3;r+=(20*Math.sin(y*PI)+40*Math.sin(y/3*PI))*2/3;r+=(160*Math.sin(y/12*PI)+320*Math.sin(y*PI/30))*2/3;return r}
    function _tLng(x,y){let r=300+x+2*y+.1*x*x+.1*x*y+.1*Math.sqrt(Math.abs(x));r+=(20*Math.sin(6*x*PI)+20*Math.sin(2*x*PI))*2/3;r+=(20*Math.sin(x*PI)+40*Math.sin(x/3*PI))*2/3;r+=(150*Math.sin(x/12*PI)+300*Math.sin(x/30*PI))*2/3;return r}
    function wgs84ToGcj02(lng,lat){if(outOfChina(lng,lat))return[lng,lat];let dlat=_tLat(lng-105,lat-35),dlng=_tLng(lng-105,lat-35),rlat=lat/180*PI,m=Math.sin(rlat),sq=Math.sqrt(1-EE*m*m);dlat=dlat*180/((A*(1-EE))/(m*sq)*PI);dlng=dlng*180/(A/sq/Math.cos(rlat)*PI);return[lng+dlng,lat+dlat]}

    // ====== 全局状态 ======
    let map=null, markers={}, autoComplete=null, placeSearch=null, geocoder=null;
    let currentCity='', currentDistrict='', currentStreet='';
    let userLng=0, userLat=0; // 未定位时不设默认值，避免错误地以北京为起点
    let _locationReady=false; // 标记定位是否已完成
    let isAMapReady=false, lastPOIResults=[];
    let currentMode='c', currentCPage='home', currentBPage='dashboard';
    let locationAccuracy=0;
    // ====== 后端对接框架（Supabase）======
    const SUPABASE_URL = window.__SUPABASE_URL__ || 'https://heggzzbtufyyglcvxzob.supabase.co';
    const SUPABASE_ANON_KEY = window.__SUPABASE_ANON_KEY__ || 'sb_publishable_gkOW9JQevAcLEiXNEXkupg_koWfYdfb';
    let supabase = null;
    let claimCache = {};
    function initSupabase(){
        if(!SUPABASE_URL||!SUPABASE_ANON_KEY){console.log("[后端] Supabase未配置，纯本地模式");return false;}
        if(!window.supabase){console.log("[后端] Supabase SDK未加载");return false;}
        try{supabase=window.supabase.createClient(SUPABASE_URL,SUPABASE_ANON_KEY);console.log("[后端] Supabase已连接");return true;}catch(e){console.log("[后端] Supabase连接失败",e);return false;}
    }
    const ClaimService={
        async getClaim(poiId){if(claimCache[poiId])return claimCache[poiId];if(!supabase)return null;try{const{data,error}=await supabase.from("hospitals_claim").select("*").eq("amap_poi_id",poiId).maybeSingle();if(error)return null;if(data)claimCache[poiId]=data;return data;}catch(e){return null;}},
        async getClaimsBatch(poiIds){if(!supabase||!poiIds.length)return{};const u=poiIds.filter(id=>!claimCache[id]);if(!u.length)return claimCache;try{const{data}=await supabase.from("hospitals_claim").select("amap_poi_id,claim_status,specialties,description").in("amap_poi_id",u);(data||[]).forEach(d=>{claimCache[d.amap_poi_id]=d;});return claimCache;}catch(e){return claimCache;}},
        async submitClaim(poiId,cd){if(!supabase){showToast("后端未配置");return false;}try{const u=supabase.auth.getUser?(await supabase.auth.getUser()).data.user:null;const row={amap_poi_id:poiId,claim_user_id:(u && u.id)||'local',claim_status:'pending',specialties:cd.specialties||[],description:cd.description||'',equipment:cd.equipment||'',price_range:cd.price_range||'',created_at:new Date().toISOString()};const{error}=await supabase.from("hospitals_claim").upsert(row,{onConflict:"amap_poi_id"});if(error){showToast("认领失败");return false;}claimCache[poiId]=row;showToast("认领申请已提交！");return true;}catch(e){showToast("网络异常");return false;}},

        _syncing: false,
        _currentUser: null,

        // 上传宠物头像到 Storage
        async uploadPetPhoto(userId, petLocalId, base64Data) {
            if (!supabase || !base64Data) return '';
            try {
                // 从 base64 提取二进制数据
                const base64Str = base64Data.split(',')[1];
                const binaryStr = atob(base64Str);
                const bytes = new Uint8Array(binaryStr.length);
                for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);
                const blob = new Blob([bytes], { type: 'image/jpeg' });

                const fileName = userId + '/' + petLocalId + '_' + Date.now() + '.jpg';
                const { error } = await supabase.storage.from('pet-avatars').upload(fileName, blob, { upsert: true });
                if (error) return base64Data; // 失败时回退到 base64

                const { data: urlData } = supabase.storage.from('pet-avatars').getPublicUrl(fileName);
                return urlData.publicUrl;
            } catch(e) { console.log('[Cloud] 头像上传失败', e); return base64Data; }
        },

        // 上传医疗附件到 Storage
        async uploadMedicalFile(userId, fileName, base64Data, fileType) {
            if (!supabase || !base64Data) return '';
            try {
                const base64Str = base64Data.split(',')[1];
                const binaryStr = atob(base64Str);
                const bytes = new Uint8Array(binaryStr.length);
                for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);
                const blob = new Blob([bytes], { type: fileType });

                const path = userId + '/' + Date.now() + '_' + fileName;
                const { error } = await supabase.storage.from('medical-files').upload(path, blob, { upsert: true });
                if (error) return '';

                // 返回存储路径
                return path;
            } catch(e) { console.log('[Cloud] 附件上传失败', e); return ''; }
        },

        // 下载附件
        getMedicalFileUrl(path) {
            if (!supabase || !path) return '';
            try {
                const { data } = supabase.storage.from('medical-files').getPublicUrl(path);
                // medical-files bucket 是私有的，需要签名URL
                // 对于私有bucket，用createSignedUrl
                return data.publicUrl;
            } catch(e) { return ''; }
        },

        // 获取签名URL（私有bucket用）
        async getSignedUrl(path) {
            if (!supabase || !path) return '';
            try {
                const { data, error } = await supabase.storage.from('medical-files').createSignedUrl(path, 3600);
                if (error || !data) return '';
                return data.signedUrl;
            } catch(e) { return ''; }
        },

        // 全量同步到云端
        async syncToCloud(data) {
            if (!this._currentUser || this._syncing) return false;
            this._syncing = true;
            const userId = this._currentUser.id;
            try {
                // 同步宠物
                for (const pet of (data.pets || [])) {
                    const petRow = {
                        user_id: userId,
                        local_id: pet.id,
                        name: pet.name || '',
                        species: pet.species || 'dog',
                        breed: pet.breed || '',
                        age: pet.age || 0,
                        weight: pet.weight || 0,
                        gender: pet.gender || 'male',
                        photo_url: pet.photo_url || '',
                        updated_at: new Date().toISOString()
                    };
                    const { data: existing } = await supabase.from('pets').select('id').eq('user_id', userId).eq('local_id', pet.id).maybeSingle();
                    if (existing) {
                        await supabase.from('pets').update(petRow).eq('id', existing.id);
                    } else {
                        await supabase.from('pets').insert(petRow);
                    }
                }

                // 同步疫苗记录
                for (const vac of (data.vaccinations || [])) {
                    const vacRow = {
                        user_id: userId,
                        pet_local_id: vac.petId,
                        name: vac.name || '',
                        vaccine_date: vac.date || '',
                        next_date: vac.nextDate || '',
                        notes: vac.notes || '',
                        updated_at: new Date().toISOString()
                    };
                    const { data: existing } = await supabase.from('vaccinations').select('id').eq('user_id', userId).eq('pet_local_id', vac.petId).eq('name', vac.name).eq('vaccine_date', vac.date || '').maybeSingle();
                    if (existing) {
                        await supabase.from('vaccinations').update(vacRow).eq('id', existing.id);
                    } else {
                        await supabase.from('vaccinations').insert(vacRow);
                    }
                }

                // 同步就诊记录（不含附件base64，附件单独上传）
                for (const rec of (data.medicalRecords || [])) {
                    const recRow = {
                        user_id: userId,
                        pet_local_id: rec.petId,
                        service: rec.service || '',
                        record_date: rec.date || '',
                        diagnosis: rec.diagnosis || '',
                        cost: rec.cost || 0,
                        hospital: rec.hospital || '',
                        notes: rec.notes || '',
                        updated_at: new Date().toISOString()
                    };
                    const { data: existing } = await supabase.from('medical_records').select('id').eq('user_id', userId).eq('pet_local_id', rec.petId).eq('service', rec.service || '').eq('record_date', rec.date || '').maybeSingle();
                    if (existing) {
                        await supabase.from('medical_records').update(recRow).eq('id', existing.id);
                    } else {
                        const { data: inserted } = await supabase.from('medical_records').insert(recRow).select('id').single();
                        if (inserted && rec.attachments && rec.attachments.length > 0) {
                            // 上传附件
                            for (const att of rec.attachments) {
                                if (att.data) {
                                    const filePath = await this.uploadMedicalFile(userId, att.name, att.data, att.type);
                                    if (filePath) {
                                        await supabase.from('medical_attachments').insert({
                                            record_id: inserted.id,
                                            user_id: userId,
                                            file_url: filePath,
                                            file_name: att.name,
                                            file_type: att.type,
                                            file_size: att.size || 0
                                        });
                                    }
                                }
                            }
                        }
                    }
                }

                // 同步收藏
                for (const fav of (data.favorites || [])) {
                    if (typeof fav === 'string') {
                        // 旧格式是字符串POI ID
                        await supabase.from('favorites').upsert({ user_id: userId, poi_id: fav, poi_name: '' }, { onConflict: 'user_id,poi_id' });
                    } else if (fav && fav.id) {
                        await supabase.from('favorites').upsert({ user_id: userId, poi_id: fav.id, poi_name: fav.name || '' }, { onConflict: 'user_id,poi_id' });
                    }
                }

                // 同步用户信息
                await supabase.from('profiles').update({
                    nickname: (data.user && data.user.name) || '',
                    phone: (data.user && data.user.phone) || '',
                    updated_at: new Date().toISOString()
                }).eq('id', userId);

                console.log('[Cloud] 同步完成');
                this._syncing = false;
                return true;
            } catch(e) {
                console.log('[Cloud] 同步失败', e);
                this._syncing = false;
                return false;
            }
        },

        // 从云端加载数据
        async loadFromCloud() {
            if (!this._currentUser) return null;
            const userId = this._currentUser.id;
            try {
                const [petsRes, vacsRes, recordsRes, favsRes, profileRes] = await Promise.all([
                    supabase.from('pets').select('*').eq('user_id', userId),
                    supabase.from('vaccinations').select('*').eq('user_id', userId),
                    supabase.from('medical_records').select('*').eq('user_id', userId),
                    supabase.from('favorites').select('*').eq('user_id', userId),
                    supabase.from('profiles').select('*').eq('id', userId).maybeSingle()
                ]);

                const pets = (petsRes.data || []).map(p => ({
                    id: p.local_id || 'cp_' + p.id,
                    name: p.name,
                    species: p.species,
                    breed: p.breed,
                    age: p.age,
                    weight: p.weight,
                    gender: p.gender,
                    photo: p.photo_url || '',
                    photo_url: p.photo_url || ''
                }));

                const vaccinations = (vacsRes.data || []).map(v => ({
                    id: 'cv_' + v.id,
                    petId: v.pet_local_id,
                    name: v.name,
                    date: v.vaccine_date,
                    nextDate: v.next_date,
                    notes: v.notes
                }));

                // 就诊记录需要加载附件
                const records = [];
                for (const r of (recordsRes.data || [])) {
                    const rec = {
                        id: 'cr_' + r.id,
                        petId: r.pet_local_id,
                        service: r.service,
                        date: r.record_date,
                        diagnosis: r.diagnosis,
                        cost: r.cost,
                        hospital: r.hospital,
                        notes: r.notes,
                        attachments: []
                    };
                    // 加载附件元数据
                    const { data: atts } = await supabase.from('medical_attachments').select('*').eq('record_id', r.id);
                    if (atts && atts.length > 0) {
                        rec.attachments = atts.map(a => ({
                            name: a.file_name,
                            type: a.file_type,
                            size: a.file_size,
                            data: '', // 不下载base64，用URL
                            file_url: a.file_url, // Storage路径
                            id: a.id
                        }));
                    }
                    records.push(rec);
                }

                const favorites = (favsRes.data || []).map(f => ({ id: f.poi_id, name: f.poi_name }));

                const profile = profileRes.data;

                return {
                    pets,
                    vaccinations,
                    medicalRecords: records,
                    favorites,
                    user: {
                        name: (profile && profile.nickname) || '',
                        phone: (profile && profile.phone) || '',
                        email: this._currentUser.email || '',
                        alipayBound: false,
                        wechatBound: false
                    }
                };
            } catch(e) {
                console.log('[Cloud] 加载失败', e);
                return null;
            }
        },

        // 从云端删除宠物
        async deletePet(petLocalId) {
            if (!this._currentUser) return;
            const userId = this._currentUser.id;
            try {
                await supabase.from('pets').delete().eq('user_id', userId).eq('local_id', petLocalId);
                await supabase.from('vaccinations').delete().eq('user_id', userId).eq('pet_local_id', petLocalId);
                // 删除相关就诊记录及其附件
                const { data: records } = await supabase.from('medical_records').select('id').eq('user_id', userId).eq('pet_local_id', petLocalId);
                if (records && records.length > 0) {
                    const recordIds = records.map(r => r.id);
                    await supabase.from('medical_attachments').delete().in('record_id', recordIds);
                    await supabase.from('medical_records').delete().in('id', recordIds);
                }
            } catch(e) { console.log('[Cloud] 删除宠物失败', e); }
        }
    };

    function handlePetPhotoUpload(input){
        if(!input.files||!input.files[0])return;
        var file=input.files[0];
        // Compress if too large (>2MB)
        var reader=new FileReader();
        reader.onload=function(e){
            var img=new Image();
            img.onload=function(){
                var canvas=document.createElement('canvas');
                var maxW=400,maxH=400;
                var w=img.width,h=img.height;
                if(w>maxW||h>maxH){
                    var ratio=Math.min(maxW/w,maxH/h);
                    w=Math.round(w*ratio);h=Math.round(h*ratio);
                }
                canvas.width=w;canvas.height=h;
                var ctx=canvas.getContext('2d');
                ctx.drawImage(img,0,0,w,h);
                var dataUrl=canvas.toDataURL('image/jpeg',0.8);
                window._petPhoto=dataUrl;
                var preview=document.getElementById('petPhotoPreview');
                if(preview){
                    preview.innerHTML='<img src="'+dataUrl+'" class="w-24 h-24 rounded-full object-cover shadow-lg" style="border:3px solid #6C3CE7">';
                }
                showToast('照片已添加');
            };
            img.src=e.target.result;
        };
        reader.readAsDataURL(file);
    }

    let _bookingSearchTimer=null;
    function searchBookingHospitals(keyword){
        if(!keyword.trim()){renderBookingList(lastPOIResults);return}
        // 先做本地过滤立即展示
        const localFiltered=lastPOIResults.filter(p=>p.name.includes(keyword)||((p.address||'').includes(keyword)));
        renderBookingList(localFiltered.length>0?localFiltered:lastPOIResults);
        // 防抖300ms后发起高德关键词搜索
        clearTimeout(_bookingSearchTimer);
        _bookingSearchTimer=setTimeout(function(){
            if(!window.AMap)return;
            var ps=new AMap.PlaceSearch({type:'090700|090701|061211',city:currentCity||'\u5168\u56fd',citylimit:false,pageSize:20,pageIndex:1,extensions:'all'});
            ps.search(keyword,function(status,result){
                if(status==='complete'&&result.poiList&&result.poiList.pois&&result.poiList.pois.length>0){
                    var pois=result.poiList.pois;
                    // 去重合并到lastPOIResults（按id+name双重去重）
                    var existIds=new Set(lastPOIResults.map(function(p){return p.id}));
                    var existNames=new Set(lastPOIResults.map(function(p){return(p.name||'').trim()}));
                    pois.forEach(function(p){var n=(p.name||'').trim();if(!existIds.has(p.id)&&!existNames.has(n)){existIds.add(p.id);existNames.add(n);lastPOIResults.push(p);}});
                    // 按关键词重新过滤展示
                    var matched=lastPOIResults.filter(function(p){return p.name.includes(keyword)||((p.address||'').includes(keyword))});
                    renderBookingList(matched.length>0?matched:pois);
                    if(supabase)ClaimService.getClaimsBatch(pois.map(function(p){return p.id}));
                }else if(status==='no_data'){
                    renderBookingList([]);
                }
            });
            // 同时搜索宠物善终类
            var ps2=new AMap.PlaceSearch({city:currentCity||'\u5168\u56fd',citylimit:false,pageSize:10,pageIndex:1,extensions:'all'});
            ps2.search(keyword,function(status2,result2){
                if(status2==='complete'&&result2.poiList&&result2.poiList.pois&&result2.poiList.pois.length>0){
                    var pois2=result2.poiList.pois;
                    var existIds2=new Set(lastPOIResults.map(function(p){return p.id}));
                    var existNames2=new Set(lastPOIResults.map(function(p){return(p.name||'').trim()}));
                    pois2.forEach(function(p){var n=(p.name||'').trim();if(!existIds2.has(p.id)&&!existNames2.has(n)){existIds2.add(p.id);existNames2.add(n);lastPOIResults.push(p);}});
                    var matched2=lastPOIResults.filter(function(p){return p.name.includes(keyword)||((p.address||'').includes(keyword))});
                    renderBookingList(matched2.length>0?matched2:pois2);
                }
            });
        },300);
    }

    function filterBookingHospitals(filter){
        document.querySelectorAll('[data-filter]').forEach(b=>{
            b.classList.toggle('pill-active',b.dataset.filter===filter);
            b.classList.toggle('pill-default',b.dataset.filter!==filter);
        });
        let list=[...lastPOIResults];
        // 专科筛选：只显示匹配该专科的医院
        const specialtyFilters=['emergency','general','neurosurgery','ophthalmology','oncology','exotic','clinic','pet_service'];
        if(specialtyFilters.includes(filter)){
            list=list.filter(p=>classifyHospital(p)===filter);
            if(list.length===0){
                renderBookingList(null,'empty_'+filter);
                return;
            }
        }
        if(filter==='near')list.sort((a,b)=>(a.distance||99999)-(b.distance||99999));
        if(filter==='rating')list.sort((a,b)=>(b.rating||0)-(a.rating||0));
        renderBookingList(list);
    }

    // ====== 附件上传 ======
    function handleAttachmentUpload(){
        const input=document.getElementById('mrFileInput');
        if(!input||!input.files||!input.files.length)return;
        const file=input.files[0];
        const maxSize=5*1024*1024; // 5MB
        if(file.size>maxSize){showToast('文件大小不能超过5MB');input.value='';return;}
        const reader=new FileReader();
        reader.onload=function(e){
            _tempAttachments.push({name:file.name,type:file.type,size:file.size,data:e.target.result});
            renderAttachmentPreview();
            input.value='';
        };
        reader.readAsDataURL(file);
    }
    function removeAttachment(idx){
        _tempAttachments.splice(idx,1);
        renderAttachmentPreview();
    }
    function renderAttachmentPreview(){
        const el=document.getElementById('attachmentPreview');
        if(!el)return;
        if(_tempAttachments.length===0){el.innerHTML='<p class="text-[12px] text-slate-400 text-center py-3">暂无附件</p>';return;}
        el.innerHTML=_tempAttachments.map(function(att,i){
            const sizeKB=(att.size/1024).toFixed(1);
            const isImg=att.type&&att.type.startsWith('image/');
            const icon=isImg?'fa-image':'fa-file-lines';
            return '<div class="flex items-center gap-3 p-2.5 rounded-xl bg-slate-50 mb-2"><div class="w-10 h-10 rounded-lg flex items-center justify-center flex-shrink-0" style="background:#EEF2FF"><i class="fas '+icon+' text-[#6C3CE7]"></i></div><div class="flex-1 min-w-0"><p class="text-[12px] font-medium truncate">'+att.name+'</p><p class="text-[10px] text-slate-400">'+sizeKB+' KB</p></div><button onclick="removeAttachment('+i+')" class="text-red-400 text-xs"><i class="fas fa-trash-can"></i></button></div>';
        }).join('');
    }

    function showAuthModal() {
        _authMode = 'login';

        document.getElementById('authPassword').value = '';

    function closeAuthModal() {
        document.getElementById('authModal').classList.add('hidden');
    }

    function toggleAuthMode() {
        if (_authMode === 'login') {
            _authMode = 'register';
            document.getElementById('authSubmitBtn').textContent = '注册';
            document.getElementById('authToggleBtn').textContent = '已有账号？去登录';
        } else {
            _authMode = 'login';
            document.getElementById('authSubmitBtn').textContent = '登录';
            document.getElementById('authToggleBtn').textContent = '没有账号？去注册';
        }
        document.getElementById('authError').classList.add('hidden');
    }

    async function handleAuthSubmit() {
        const agreeBox = document.getElementById('authAgree');
        if(agreeBox && !agreeBox.checked){
            const errEl = document.getElementById('authError');
            errEl.textContent = '请先阅读并同意用户协议和隐私政策';
            errEl.classList.remove('hidden');
            return;
        }
        const email = document.getElementById('authEmail').value.trim();
        const password = document.getElementById('authPassword').value;
        const errEl = document.getElementById('authError');

        if (!email || !password) {
            errEl.textContent = '请填写邮箱和密码';
            errEl.classList.remove('hidden');
            return;
        }
        if (password.length < 6) {
            errEl.textContent = '密码至少6位';
            errEl.classList.remove('hidden');
            return;
        }

        const btn = document.getElementById('authSubmitBtn');
        btn.textContent = '处理中...';
        btn.disabled = true;

        let result;
        if (_authMode === 'register') {
            result = await CloudService.signUp(email, password);
        } else {
            result = await CloudService.signIn(email, password);
        }

        btn.disabled = false;

        if (result.ok) {
            closeAuthModal();
            if (_authMode === 'register') {
                showToast('注册成功！请验证邮箱后登录');
                _authMode = 'login';
            } else {
                showToast('登录成功！正在同步数据...');
                // 登录成功后加载云端数据
                await loadCloudDataOnLogin();
                showCPage('profile');
            }
        } else {
            btn.textContent = _authMode === 'login' ? '登录' : '注册';
            errEl.textContent = result.msg || '操作失败';
            errEl.classList.remove('hidden');
        }
    }

    async function loadCloudDataOnLogin() {
        const cloudData = await CloudService.loadFromCloud();
        if (!cloudData) {
            showToast('云端暂无数据，当前数据将自动上传');
            // 首次登录，上传本地数据到云端
            await CloudService.syncToCloud(appData);
            return;
        }

        // 合并策略：云端优先，但保留本地新增的数据
        const localPetIds = (appData.pets || []).map(p => p.id);
        const cloudPetIds = (cloudData.pets || []).map(p => p.id);

        // 合并宠物
        const mergedPets = [...(cloudData.pets || [])];
        for (const lp of (appData.pets || [])) {
            if (!cloudPetIds.includes(lp.id)) {
                mergedPets.push(lp); // 本地新增的宠物
            }
        }

        // 合并疫苗记录
        const mergedVacs = [...(cloudData.vaccinations || [])];
        const cloudVacKeys = (cloudData.vaccinations || []).map(v => v.petId + '|' + v.name + '|' + v.date);
        for (const lv of (appData.vaccinations || [])) {
            const key = lv.petId + '|' + lv.name + '|' + lv.date;
            if (!cloudVacKeys.includes(key)) {
                mergedVacs.push(lv);
            }
        }

        // 合并就诊记录
        const mergedRecords = [...(cloudData.medicalRecords || [])];
        const cloudRecKeys = (cloudData.medicalRecords || []).map(r => r.petId + '|' + r.service + '|' + r.date);
        for (const lr of (appData.medicalRecords || [])) {
            const key = lr.petId + '|' + lr.service + '|' + lr.date;
            if (!cloudRecKeys.includes(key)) {
                mergedRecords.push(lr);
            }
        }

        // 更新 appData
        appData.pets = mergedPets;
        appData.vaccinations = mergedVacs;
        appData.medicalRecords = mergedRecords;

        // 用户信息：云端优先
        if (cloudData.user) {
            if (cloudData.user.name) appData.user.name = cloudData.user.name;
            if (cloudData.user.phone) appData.user.phone = cloudData.user.phone;
            appData.user.email = cloudData.user.email || '';
        }

        // 收藏合并
        if (cloudData.favorites && cloudData.favorites.length > 0) {
            const existingFavIds = (appData.favorites || []).map(f => typeof f === 'string' ? f : f.id);
            for (const cf of cloudData.favorites) {
                if (!existingFavIds.includes(cf.id)) {
                    appData.favorites.push(cf);
                }
            }
        }

        save();

        const petCount = mergedPets.length;
        const vacCount = mergedVacs.length;
        const recCount = mergedRecords.length;
        showToast('云端数据已同步：' + petCount + '只宠物，' + vacCount + '条疫苗，' + recCount + '条就诊');
    }

    function editProfile(){
        const name=prompt('昵称',appData.user.name);
        if(name===null)return;
        const phone=prompt('手机号（用于实名定位）',appData.user.phone);
        const oldPhone=appData.user.phone;
        appData.user.name=name;appData.user.phone=phone||'';
        save();showCPage('profile');showToast('已更新');
        if(CloudService._currentUser){
            supabase.from('profiles').update({nickname:name,phone:phone||''}).eq('id',CloudService._currentUser.id);
        }
        // 手机号变更时触发重新定位
        if(phone&&phone!==oldPhone&&phone.length>=11){
            showToast('手机号已更新，重新定位中...');
            setTimeout(()=>doGeolocation(),500);
        }
    }

        if(!appData.favorites)appData.favorites=[];
        const idx=appData.favorites.findIndex(function(f){return f.id===poiId});
        if(idx>-1){appData.favorites.splice(idx,1);showToast('已取消收藏')}
        else{appData.favorites.push({id:poiId,name:poiName});showToast('❤️ 已收藏')}
        save();
        // 刷新当前页面
        if(currentCPage==='booking'){
            var listEl=document.getElementById('bookingHospitalList');
            if(listEl)renderBookingList(lastPOIResults);

            if(el)el.innerHTML=renderCFavorites();
        }

    function selectSpecies(sp){
        window._petSpecies=sp;
        document.querySelectorAll('[data-sp]').forEach(b=>{b.classList.toggle('pill-active',b.dataset.sp===sp);b.classList.toggle('pill-default',b.dataset.sp!==sp)});
    }
    function selectGender(gd){
        window._petGender=gd;
        document.querySelectorAll('[data-gd]').forEach(b=>{b.classList.toggle('pill-active',b.dataset.gd===gd);b.classList.toggle('pill-default',b.dataset.gd!==gd)});
    }

    function savePet(editId){
        const name=document.getElementById('petName').value.trim();
        if(!name){showToast('请输入宠物名字');return}
        const data={name,species:window._petSpecies,breed:document.getElementById('petBreed').value.trim(),age:parseInt(document.getElementById('petAge').value)||0,weight:parseFloat(document.getElementById('petWeight').value)||0,gender:window._petGender};
        // Handle photo
        if(window._petPhoto!==undefined){
            data.photo=window._petPhoto;
        }
        if(editId){
            const idx=appData.pets.findIndex(p=>p.id===editId);
            if(idx>-1){
                if(window._petPhoto===null){data.photo='';}  // explicitly removed
                appData.pets[idx]={...appData.pets[idx],...data};
            }
        }else{
            data.id='p'+Date.now();
            appData.pets.push(data);
        }
        window._petPhoto=undefined;
        save();closePetForm();showCPage(currentCPage);showToast(editId?'已保存':'已添加');
    }

    // ====== 高德地图 ======
    let isAMapLoaded=false; // AMap JS是否已加载（不一定创建了地图实例）

    function closeMapModal(){document.getElementById('mapModal').classList.add('hidden')}

    // 第一步：加载高德JS SDK（不创建地图，仅加载插件）
    function initAMap(){
        if(!AMAP_CONFIG.key){showToast('未配置高德地图Key');return}
        if(isAMapLoaded)return;
        if(AMAP_CONFIG.securityJsCode)window._AMapSecurityConfig={securityJsCode:AMAP_CONFIG.securityJsCode};
        AMapLoader.load({key:AMAP_CONFIG.key,version:"2.0",plugins:["AMap.Geolocation","AMap.PlaceSearch","AMap.AutoComplete","AMap.Geocoder","AMap.Scale","AMap.ToolBar","AMap.CitySearch"]}).then(AMap=>{
            window.AMap=AMap;isAMapLoaded=true;
            // AMap已加载，立即执行定位和搜索（不需要地图实例）
            doGeolocation();
            initSearchAutocomplete();
        }).catch(err=>{console.error('高德JS加载失败:',err);showToast('定位服务加载失败，请刷新')});
    }

    // 第二步：创建地图实例（仅打开地图弹窗时调用）
    function createMapInstance(){
        if(!window.AMap)return;
        if(_locationReady&&userLng!==0){
            _openMapModal();
        }else{
            // 定位未完成，先快速用CitySearch获取城市中心，确保地图能打开
            showToast('正在获取位置...');
            quickCitySearch(()=>{
                _openMapModal();
            });
        }
    }

    // 快速获取城市中心点（不阻塞地图打开）
    function quickCitySearch(callback){
        if(_locationReady&&userLng!==0){callback();return}
        // 优先用CitySearch获取城市中心
        if(window.AMap&&window.AMap.CitySearch){
            try{
                const cs=new window.AMap.CitySearch();
                cs.getLocalCity((status,result)=>{
                    if(status==='complete'&&result.info==='OK'){
                        currentCity=result.city||'';
                        if(result.bounds){
                            const center=result.bounds.getCenter();
                            if(userLng===0||userLat===0){
                                userLng=center.lng;userLat=center.lat;
                            }
                        }
                        if(!_locationReady){_locationReady=true;}
                    }
                    callback();
                });
                // 5秒超时，避免CitySearch也卡住
                setTimeout(()=>{callback()},5000);
                return;
            }catch(e){console.warn('[定位] CitySearch异常:',e)}
        }
        // CitySearch不可用，直接用默认中心
        if(userLng===0||userLat===0){
            userLng=121.473701;userLat=31.230416; // 默认上海
            currentCity='上海';
            _locationReady=true;
        }
        callback();
    }

    function _openMapModal(){
        if(!window.AMap)return;
        map=new window.AMap.Map('fullMap',{zoom:14,center:[userLng,userLat],mapStyle:'amap://styles/whitesmoke',viewMode:'2D'});

        map.addControl(new window.AMap.ToolBar({position:{bottom:'140px',right:'16px'}}));
        isAMapReady=true;

        setTimeout(()=>map.resize(),100);
    }

    // ====== 多策略定位 ======
    let _manualCorrecting=false;
    function doGeolocation(){
        if(_manualCorrecting)return;
        // 策略1: 高德Geolocation插件（最可靠的浏览器定位，含GPS+IP混合）
        if(window.AMap){
            amapLocate();
        }
        // 策略2: HTML5原生定位（需要HTTPS，作为补充，延迟3秒启动避免与高德冲突）
        if(navigator.geolocation && location.protocol==='https:'){
            setTimeout(()=>{
                if(_locationReady||_manualCorrecting)return; // 高德已定位成功则跳过
                navigator.geolocation.getCurrentPosition(pos=>{
                    if(_manualCorrecting||_locationReady)return;
                    const [gcjLng,gcjLat]=wgs84ToGcj02(pos.coords.longitude,pos.coords.latitude);
                    userLng=gcjLng;userLat=gcjLat;locationAccuracy=pos.coords.accuracy;
                    _locationReady=true;
                    onLocationSuccess(gcjLng,gcjLat);
                },()=>{},{enableHighAccuracy:true,timeout:6000,maximumAge:5000});
            },3000);
        }
    }

    function reGeolocation(){
        showToast('正在重新定位...');
        _manualCorrecting=false;
        _locationReady=false;
        doGeolocation();
    }

    // 手动纠正定位：用户在地图上长按/拖动设置位置
    function enableManualCorrect(){
        if(!map||!window.AMap){showToast('请先打开地图');return}
        showToast('点击地图设置您的准确位置');
        _manualCorrecting=true;
        map.setDefaultCursor('crosshair');
        const handler=(e)=>{
            const lng=e.lnglat.getLng(),lat=e.lnglat.getLat();
            userLng=lng;userLat=lat;locationAccuracy=0;
            _locationReady=true;
            reverseGeocode(lng,lat);
            addUserMarker();
            searchNearbyHospitals();
            map.setDefaultCursor('');
            _manualCorrecting=false;
            map.off('click',handler);
            showToast('定位已更新');
        };
        map.on('click',handler);
    }

    function amapLocate(){
        if(!window.AMap){updateLocationDisplay('定位失败');return}
        // 高德浏览器定位插件（GPS+IP混合定位，无需HTTPS也能IP定位）
        const geo=new window.AMap.Geolocation({enableHighAccuracy:true,timeout:10000,GeoLocationFirst:true,showButton:false,noIpLocate:0,needAddress:true});
        geo.getCurrentPosition((status,result)=>{
            if(status==='complete'){
                userLng=result.position.lng;userLat=result.position.lat;
                locationAccuracy=result.accuracy||0;
                currentCity=(result.addressComponent && result.addressComponent.city)||(result.addressComponent && result.addressComponent.province)||'';
                currentDistrict=(result.addressComponent && result.addressComponent.district)||'';
                _locationReady=true;
                onLocationSuccess(userLng,userLat);
            }else{
                // 高德Geolocation失败，走CitySearch纯IP定位（任何环境都能用）
                console.warn('[定位] 高德Geolocation失败:',(result && result.message)||result);
                citySearchLocate();
            }
        });
    }

    function citySearchLocate(){
        if(!window.AMap||!window.AMap.CitySearch){
            updateLocationDisplay('定位失败');
            // 无任何定位能力时，用IP定位API兜底
            ipLocateFallback();
            return;
        }
        const cs=new window.AMap.CitySearch();
        cs.getLocalCity((status,result)=>{
            if(status==='complete'&&result.info==='OK'){
                currentCity=result.city||'';
                const bounds=result.bounds;
                if(bounds){
                    const center=bounds.getCenter();
                    userLng=center.lng;userLat=center.lat;
                }
                _locationReady=true;
                onLocationSuccess(userLng,userLat);
            }else{
                console.warn('[定位] CitySearch也失败，尝试IP兜底');
                ipLocateFallback();
            }
        });
    }

    // 最终兜底：用高德CitySearch重试，或设默认城市
    function ipLocateFallback(){
        // 再试一次CitySearch（有时首次失败重试能成功）
        if(window.AMap&&window.AMap.CitySearch){
            try{
                const cs=new window.AMap.CitySearch();
                cs.getLocalCity((status,result)=>{
                    if(status==='complete'&&result.info==='OK'){
                        currentCity=result.city||'';
                        if(result.bounds){
                            const center=result.bounds.getCenter();
                            userLng=center.lng;userLat=center.lat;
                        }
                        _locationReady=true;
                        onLocationSuccess(userLng,userLat);
                    }else{
                        _setFallbackLocation();
                    }
                });
                return;
            }catch(e){console.warn('[定位] CitySearch重试异常:',e)}
        }
        _setFallbackLocation();
    }

    function _setFallbackLocation(){
        // 所有定位方式都失败，使用默认城市中心
        if(userLng===0||userLat===0){
            userLng=121.473701;userLat=31.230416; // 默认上海
            currentCity='上海';
        }
        _locationReady=true;
        updateLocationDisplay(currentCity||'定位失败，已使用默认位置');
        saveUserLocation();
        searchNearbyHospitals();
    }

    function onLocationSuccess(lng,lat){
        reverseGeocode(lng,lat);
        if(map){map.setCenter([lng,lat]);addUserMarker()}
        searchNearbyHospitals();
    }

    function reverseGeocode(lng,lat){
        if(!window.AMap)return;
        const geo=new window.AMap.Geocoder({radius:1000,extensions:'all'});
        geo.getAddress([lng,lat],(status,result)=>{
            if(status==='complete'&&result.regeocode){
                const c=result.regeocode.addressComponent;
                currentCity=c.city||c.province||currentCity;
                currentDistrict=c.district||'';
                currentStreet=(c.township||'')+(c.street||'')+(c.streetNumber||'');
                const full=currentCity+currentDistrict+currentStreet;
                updateLocationDisplay(full);
                saveUserLocation();
            }else{
                updateLocationDisplay(currentCity||'定位失败');
                saveUserLocation();
            }
            // 逆地理编码完成后刷新首页医院列表（此时POI搜索可能已完成）
            updateHomeNearbyHospitals();
            if(document.getElementById('bookingHospitalList'))renderBookingList(lastPOIResults);
        });
    }

    // 为每个POI匹配专科标签
    // 规则：善终服务通过关键词精确匹配（高德无"宠物丧葬"分类代码，071900是人类丧葬，不能用typecode判断）
    // 判断是否为非医疗类宠物服务门店
    function isNonMedicalPetService(poi){
        const name=(poi.name||'').toLowerCase();
        const typecode=(poi.typecode||'').toString();
        // ★ typecode为医疗机构 → 无论名称是否含美容/用品等关键词，都不是非医疗
        if(typecode==='090700'||typecode==='090701')return false;
        // typecode明确为非医疗（宠物用品店）
        if(typecode==='061211')return true;
        // ★ 名称中包含"医院"或"诊所"或"医疗" → 视为医疗机构
        if(name.includes('医院')||name.includes('诊所')||name.includes('医疗'))return false;
        // 名称关键词匹配非医疗服务
        const nonMedKw=['宠物店','宠物用品','宠物美容','宠物洗澡','宠物洗护','宠物寄养','宠物训练','宠物食品','宠物零食','宠物玩具','宠物服装','宠物生活馆','宠物会所','宠物乐园','猫舍','犬舍','猫咖','宠物咖啡','水族','鱼缸','宠物摄影','宠物托运','宠物保险','宠物用品店'];
        return nonMedKw.some(kw=>name.includes(kw));
    }

    function classifyHospital(poi){
        const name=(poi.name||'').toLowerCase();
        const typeStr=(poi.type||'').toLowerCase();
        const typecode=(poi.typecode||'').toString();
        const text=name+' '+typeStr;

        // ★ 第一优先级：宠物善终服务（最高优先级，名称/类型中含殡葬相关关键词）
        const hospiceKw=['宠物善终','宠物殡葬','宠物火化','宠物骨灰','宠物告别','宠物殡仪','宠物安葬','宠物墓','宠物墓园','宠物追思','宠物纪念','宠物念福','宠物焚化','宠物骨灰盒','宠物纪念堂','善终服务','善宠','宠物安乐死'];
        if(hospiceKw.some(kw=>name.includes(kw)||typeStr.includes(kw)))return 'hospice';
        if((name.includes('善终')||name.includes('殡葬')||name.includes('火化'))&&(name.includes('宠')||typeStr.includes('宠物')))return 'hospice';
        if(typeStr.includes('宠物殡葬')||typeStr.includes('宠物善终')||typeStr.includes('宠物火化'))return 'hospice';

        // ★ 第二优先级：非医疗类宠物服务 → 宠物周边（先排除，避免误入医疗分类）
        if(isNonMedicalPetService(poi))return 'pet_service';

        // ★ 第三优先级：医疗类专科关键词匹配（此时已确认是医院/诊所）
        const specKeys=['emergency','neurosurgery','ophthalmology','oncology','exotic'];
        for(const key of specKeys){
            const spec=SPECIALTY_MAP[key];
            if(spec.keywords.some(kw=>text.includes(kw)))return key;
        }

        // ★ 第四优先级：综合医院（需要明确证据：名称含"综合/全科/转诊/教学/中心医院"）
        const generalKw=['综合','全科','转诊中心','教学医院','中心医院','转诊'];
        if(generalKw.some(kw=>name.includes(kw)))return 'general';

        // ★ 兜底：普通宠物医院/诊所（无明确专科，不是综合医院）
        return 'clinic';
    }

    function searchNearbyHospitals(){
        if(!window.AMap)return;
        if(!_locationReady||(userLng===0&&userLat===0)){
            console.log('[搜索] 等待定位完成...');
            return;
        }
        const radii=[10000,20000,30000];

        let hospiceResults=[];
        let petServiceResults=[];
        let searchDone=0;
        let specialtyResults=[];

        // 合并四组搜索结果并渲染
        function mergeAndRender(){
            searchDone++;
            if(searchDone<4)return; // 四组都搜完才渲染
            // 去重（同一POI可能在多组中都出现，按id和name双重去重）
            const allResults=[...hospitalResults];
            const existIds=new Set(allResults.map(p=>p.id));
            const existNames=new Set(allResults.map(p=>(p.name||'').trim()));
            function _dedup(arr){arr.forEach(p=>{const n=(p.name||'').trim();if(!existIds.has(p.id)&&!existNames.has(n)){existIds.add(p.id);existNames.add(n);allResults.push(p);}});}
            _dedup(hospiceResults);_dedup(petServiceResults);_dedup(specialtyResults);
            // 按距离排序
            allResults.sort((a,b)=>(a.distance||0)-(b.distance||0));
            lastPOIResults=allResults;if(supabase)ClaimService.getClaimsBatch(allResults.map(function(p){return p.id}));renderPOIMarkers(lastPOIResults);
            updateHomeNearbyHospitals();
            if(document.getElementById('bookingHospitalList'))renderBookingList(lastPOIResults);
        }

        // 第一组：宠物医疗+用品类POI（高德标准分类代码）
        function searchHospitals(){
            let ri=0;
            function doSearch(){
                const ps=new window.AMap.PlaceSearch({type:'090700|090701|061211',city:currentCity||'全国',citylimit:!!currentCity,pageSize:30,pageIndex:1,autoFitView:true,extensions:'all'});
                ps.searchNearBy('',[userLng,userLat],radii[ri],(status,result)=>{
                    if(status==='complete'&&result.poiList&&result.poiList.pois&&result.poiList.pois.length>0){
                        hospitalResults=result.poiList.pois;
                        mergeAndRender();
                    }else if(ri<radii.length-1){

                        hospitalResults=[];

                });
            }
            doSearch();
        }

    function renderPOIMarkers(pois){
        if(!map||!window.AMap)return;
        Object.values(markers).forEach(m=>map.remove(m));markers={};
        pois.forEach(poi=>{
            try{
                if(!poi.location||typeof poi.location!=='object')return;
                const lng=parseFloat(poi.location.lng);
                const lat=parseFloat(poi.location.lat);
                if(isNaN(lng)||isNaN(lat))return;
                if(!poi.fullAddress){
                    const gc=new window.AMap.Geocoder({radius:100});
                    gc.getAddress([lng,lat],(s,r)=>{if(s==='complete'&&r.regeocode)poi.fullAddress=r.regeocode.formattedAddress});
                }
                const specKey=classifyHospital(poi)||'clinic';
                const spec=SPECIALTY_MAP[specKey]||SPECIALTY_MAP.clinic;
                const content=`<div class="h-marker" style="background:${spec.color}"><i class="fas ${spec.icon} text-white text-base"></i></div>`;
                const marker=new window.AMap.Marker({position:[lng,lat],content,offset:new window.AMap.Pixel(-19,-19),title:(poi.name||'未命名')+' ['+spec.label+']',extData:{poi,specKey}});
                marker.on('click',()=>showPOIDetail(poi));
                map.add(marker);markers[poi.id]=marker;
            }catch(e){console.error('渲染POI标记失败:',poi,e);}
        });
    }

    function toggleFavorite(poiId,poiName){
        if(!appData.favorites)appData.favorites=[];
        const idx=appData.favorites.findIndex(f=>f.id===poiId);
        if(idx>-1){appData.favorites.splice(idx,1);showToast('已取消收藏')}
        else{appData.favorites.push({id:poiId,name:poiName});showToast('❤️ 已收藏')}
        save();
        // 更新POI详情页的爱心图标
        var favBtn=document.getElementById('favBtn_'+poiId);
        if(favBtn){
            var isFav=appData.favorites.some(function(f){return f.id===poiId});
            favBtn.style.background=isFav?'#FFF0F5':'#F8F7FF';
            favBtn.style.color=isFav?'#FF6B9D':'#6C3CE7';
            var icon=favBtn.querySelector('i');
            if(icon){icon.className=isFav?'fas fa-heart':'far fa-heart';icon.style.color=isFav?'#FF6B9D':'';}
        }
        // 刷新预约列表的收藏状态
        if(currentCPage==='booking'){
            var listEl=document.getElementById('bookingHospitalList');
            if(listEl)renderBookingList(lastPOIResults);
        }
        if(currentCPage==='favorites'){
            var el=document.getElementById('cContent');
            if(el)el.innerHTML=renderCFavorites();
        }
    }

    async function loadClaimAndDoctors(poi){
        var badgeEl=document.getElementById("claimBadge_"+poi.id);
        var docSectionEl=document.getElementById("docSection_"+poi.id);
        if(badgeEl){
            var claim=await ClaimService.getClaim(poi.id);
            if(claim&&claim.claim_status==="verified")badgeEl.innerHTML='<span class="claim-badge claim-badge-verified"><i class="fas fa-check-circle"></i> 已认证</span>';
            else if(claim&&claim.claim_status==="pending")badgeEl.innerHTML='<span class="claim-badge claim-badge-pending"><i class="fas fa-clock"></i> 认领审核中</span>';
            else badgeEl.innerHTML='<span class="claim-badge claim-badge-unclaimed"><i class="fas fa-store"></i> 未认领</span>';
            if(claim&&claim.specialties&&claim.specialties.length>0){var sd=document.createElement("div");sd.className="mt-2 flex flex-wrap gap-1";claim.specialties.forEach(function(s){sd.innerHTML+='<span class="text-[11px] px-2 py-0.5 rounded-lg font-medium" style="background:#F3E8FF;color:#6C3CE7">'+s+'</span>';});badgeEl.after(sd);}
            if(claim&&claim.description){var dd=document.createElement("div");dd.className="mt-2 text-[12px] text-slate-500";dd.textContent=claim.description;badgeEl.parentElement.appendChild(dd);}

    // ====== 搜索联想 ======
    function initSearchAutocomplete(){
        if(!window.AMap)return;
        autoComplete=new window.AMap.AutoComplete({city:currentCity||'全国',citylimit:!!currentCity});
        const input=document.getElementById('mapSearchInput');
        const box=document.getElementById('searchSuggestions');
        input.addEventListener('input',e=>{
            const kw=e.target.value.trim();
            if(kw.length<2){box.classList.add('hidden');return}
            autoComplete.search(kw,(status,result)=>{
                if(status==='complete'&&result.tips)renderSuggestions(result.tips);
                else box.classList.add('hidden');
            });
        });
        input.addEventListener('blur',()=>setTimeout(()=>box.classList.add('hidden'),200));
    }

    function renderSuggestions(tips){
        const box=document.getElementById('searchSuggestions');
        if(!tips||!tips.length){box.classList.add('hidden');return}
        box.innerHTML=tips.filter(t=>t.location).map(t=>`
            <div class="suggest-item" onclick="selectSuggestion('${t.id}','${t.name}',${t.location.lng},${t.location.lat})">
                <p class="text-[13px] font-medium">${t.name}</p>
                <p class="text-[11px] text-slate-400">${t.district||''} ${t.address||''}</p>
            </div>`).join('');
        box.classList.remove('hidden');
    }

    function selectSuggestion(id,name,lng,lat){
        document.getElementById('searchSuggestions').classList.add('hidden');
        document.getElementById('mapSearchInput').value=name;
        if(map&&window.AMap){
            map.setCenter([lng,lat]);map.setZoom(15);
            // 同时搜宠物医疗、丧葬设施和周边服务
            let sResults=[];
            let sDone=0;
            function sMerge(){
                sDone++;
                if(sDone<3)return;
                const allR=[...sResults[0]];
                const ids=new Set(allR.map(p=>p.id));
                sResults[1].forEach(p=>{if(!ids.has(p.id))allR.push(p)});
                sResults[2].forEach(p=>{if(!ids.has(p.id))allR.push(p)});
                allR.sort((a,b)=>(a.distance||0)-(b.distance||0));
                lastPOIResults=allR;
                renderPOIMarkers(lastPOIResults);
            }
            sResults=[[],[],[]];
            const ps1=new window.AMap.PlaceSearch({type:'090700|090701|061211',pageSize:20,extensions:'all'});
            ps1.searchNearBy('',[lng,lat],10000,(s,r)=>{if(s==='complete'&&r.poiList&&r.poiList.pois)sResults[0]=r.poiList.pois;sMerge()});
            // 宠物善终用关键词搜索
            const ps2=new window.AMap.PlaceSearch({pageSize:10,extensions:'all'});
            ps2.searchNearBy('宠物善终|宠物殡葬|宠物火化',[lng,lat],10000,(s,r)=>{if(s==='complete'&&r.poiList&&r.poiList.pois)sResults[1]=r.poiList.pois;sMerge()});
            // 宠物周边服务
            const ps3=new window.AMap.PlaceSearch({pageSize:10,extensions:'all'});
            ps3.searchNearBy('宠物用品|宠物美容|宠物寄养|宠物洗护|宠物训练|宠物食品',[lng,lat],10000,(s,r)=>{if(s==='complete'&&r.poiList&&r.poiList.pois)sResults[2]=r.poiList.pois;sMerge()});
        }
    }

                    for(let i=0;i<nearby.length;i++){

    function submitBooking(poiId,poiName){
        if(!window._selectedPet){showToast('请选择宠物');return}
        if(!document.getElementById('bookingDate').value){showToast('请选择日期');return}
        if(!window._selectedTime){showToast('请选择时间');return}
        const doctors=getHospitalDoctors(poiId);
        const selectedDoc=window._selectedDocIdx>=0?doctors[window._selectedDocIdx]:null;
        var appt={
            id:'a'+Date.now(),petId:window._selectedPet,
            hospitalId:poiId,hospitalName:poiName,
            service:document.getElementById('bookingService').value,
            date:document.getElementById('bookingDate').value,
            time:window._selectedTime,status:'pending',
            doctorName:(selectedDoc && selectedDoc.name)||'',
            doctorFee:(selectedDoc && selectedDoc.fee)||0
        };
        appData.appointments.push(appt);
        save();closeBookingModal();closeDetailPanel();
        showToast('预约成功，等待医院确认');
        ClaimService.submitAppointment(appt);
        if(currentMode==='c')showCPage(currentCPage);else showBPage(currentBPage);
    }

    // ====== 初始化（v1.4.0 Safari 兼容修复） ======
    document.addEventListener('DOMContentLoaded',function(){
        console.log('[Doctor亿万] DOMContentLoaded 触发');
        // 第一步：立即渲染页面内容（不依赖任何外部库）
        try{
            switchMode('c');
            console.log('[Doctor亿万] 页面渲染完成');
        }catch(e){
            console.error('[Doctor亿万] 页面渲染失败:',e);
            // 即使渲染失败，也显示一个基本提示
            var cc = document.getElementById('cContent');
            if(cc) cc.innerHTML = '<div style="padding:40px;text-align:center;color:#666"><p>页面加载出错，请刷新重试</p></div>';
        }
        // 第二步：Supabase 延迟初始化（SDK可能还没加载完，不阻塞页面）
        if(window.supabase){
            try{initSupabase();}catch(e){console.error('[后端] 初始化失败:',e);}
        }else{
            var retryCount=0;
            var retryTimer=setInterval(function(){
                retryCount++;
                if(window.supabase){
                    clearInterval(retryTimer);
                    try{initSupabase();}catch(e){console.error('[后端] 延迟初始化失败:',e);}
                    console.log('[后端] Supabase SDK延迟加载成功');
                }
                if(retryCount>10){
                    clearInterval(retryTimer);
                    console.log('[后端] Supabase SDK加载超时，使用本地模式');
                }
            },1000);
        }
        // 检查云端登录状态（v1.4.0: 加 try/catch 防止云端错误影响页面）
        try{
            if(supabase){
                CloudService.checkAuth().then(function(user){
                    if(user){
                        console.log('[Cloud] 已登录:', user.email);
                        CloudService.loadFromCloud().then(function(cloudData){
                            if(cloudData && cloudData.pets && cloudData.pets.length > 0){
                                var localPetIds = (appData.pets||[]).map(function(p){return p.id;});
                                for(var ci=0; ci<cloudData.pets.length; ci++){
                                    var cp = cloudData.pets[ci];
                                    if(localPetIds.indexOf(cp.id)===-1) appData.pets.push(cp);
                                }
                                var cloudVacKeys = (appData.vaccinations||[]).map(function(v){return v.petId+'|'+v.name+'|'+v.date;});

                                }
                                var cloudRecKeys = (appData.medicalRecords||[]).map(function(r){return r.petId+'|'+r.service+'|'+r.date;});
                                for(var ri=0; ri<(cloudData.medicalRecords||[]).length; ri++){
                                    var cr = cloudData.medicalRecords[ri];
                                    if(cloudRecKeys.indexOf(cr.petId+'|'+cr.service+'|'+cr.date)===-1) appData.medicalRecords.push(cr);
                                }
                                save();
                                console.log('[Cloud] 数据已合并');
                            }
                        }).catch(function(e){console.error('[Cloud] 加载云端数据失败:',e);});
                    }
                }).catch(function(e){console.error('[Cloud] 检查登录状态失败:',e);});
            }
        }catch(e){console.error('[Cloud] 云端初始化异常:',e);}
        // 1. 先用缓存位置更新首页UI（v1.4.0: try/catch 包裹）
        try{
            if(restoreUserLocation()){

            }
        }catch(e){console.error('[定位] 缓存位置恢复失败:',e);}
        // 2. 立即加载高德SDK并自动定位
        try{initAMap();}catch(e){console.error('[地图] 初始化失败:',e);}
    });
    </script>

    <div id="pwa-install-banner" style="display:none;position:fixed;bottom:0;left:0;right:0;z-index:9999;padding:12px 16px;background:linear-gradient(135deg,rgba(108,60,231,.97),rgba(139,92,246,.97));backdrop-filter:blur(20px);box-shadow:0 -4px 24px rgba(108,60,231,.25);animation:fadeUp .4s cubic-bezier(.22,1,.36,1) both">

            </div>
