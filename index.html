                <div style="color:#fff;font-size:14px;font-weight:700;line-height:1.3">安装 Doctor亿万</div>
                <div style="color:rgba(255,255,255,.8);font-size:12px;line-height:1.3;margin-top:2px">添加到桌面，快速访问宠物医疗服务</div>
            </div>
            <div id="pwa-install-btn" style="padding:10px 18px;border-radius:100px;background:#fff;color:#6C3CE7;font-size:13px;font-weight:700;cursor:pointer;white-space:nowrap;flex-shrink:0;transition:transform .15s" onclick="window._pwaInstall()">安装</div>
            <div id="pwa-close-btn" style="width:28px;height:28px;border-radius:50%;background:rgba(255,255,255,.15);display:flex;align-items:center;justify-content:center;cursor:pointer;flex-shrink:0;color:rgba(255,255,255,.7);font-size:16px" onclick="window._pwaDismiss()">×</div>
        </div>
    </div>
    <script>
    (function() {
        // === Service Worker 注册 ===
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', function() {
                navigator.serviceWorker.register('./sw.js', { scope: './' })
                    .then(function(reg) {
                        console.log('[PWA] SW注册成功, scope:', reg.scope);
                        // 检查更新
                        reg.update();
                        // 检测新版本
                        reg.onupdatefound = function() {
                            var installing = reg.installing;
                            installing.onstatechange = function() {
                                if (installing.state === 'installed' && navigator.serviceWorker.controller) {
                                    if(confirm('🐾 Doctor亿万有新版本啦！\n点击确定立即更新，体验最新功能。')){
                                        reg.waiting.postMessage('SKIP_WAITING');
                                        setTimeout(function(){ location.reload(); }, 300);
                                    }
                                }
                            };
                        };
                    })
                    .catch(function(err) {
                        console.log('[PWA] SW注册失败:', err);
                    });
                // 监听新SW接管完成
                var refreshing = false;
                navigator.serviceWorker.addEventListener('controllerchange', function() {
                    if (refreshing) return;
                    refreshing = true;
                    location.reload();
                });
            });
        }

        // === PWA 安装提示 ===
        var deferredPrompt = null;
        var banner = document.getElementById('pwa-install-banner');

        // 检查是否已安装或用户已关闭
        function shouldShowBanner() {
            // 已在 standalone 模式（已安装）
            if (window.matchMedia && window.matchMedia('(display-mode: standalone)').matches) return false;
            if (window.navigator.standalone === true) return false;
            // 用户已关闭
            if (localStorage.getItem('pwa-banner-dismissed')) return false;
            return true;
        }

        // 监听 beforeinstallprompt
        window.addEventListener('beforeinstallprompt', function(e) {
            e.preventDefault();
            deferredPrompt = e;
            if (shouldShowBanner()) {
                banner.style.display = 'block';
            }
        });

        // 安装按钮点击
        window._pwaInstall = function() {
            if (!deferredPrompt) return;
            deferredPrompt.prompt();
            deferredPrompt.userChoice.then(function(choiceResult) {
                if (choiceResult.outcome === 'accepted') {
                    console.log('[PWA] 用户已安装');
                    banner.style.display = 'none';
                }
                deferredPrompt = null;
            });
        };

        // 关闭按钮
        window._pwaDismiss = function() {
            banner.style.display = 'none';
            localStorage.setItem('pwa-banner-dismissed', '1');
        };

        // 安装成功后隐藏横幅
        window.addEventListener('appinstalled', function() {
            banner.style.display = 'none';
            deferredPrompt = null;
            console.log('[PWA] 应用已安装');
        });
    })();
    </script>
